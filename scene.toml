[time]
# One UTC per exposure (milliseconds). Stored to FITS as DATE-OBS and JD-OBS (full JD, f15.7).
utc = "2006-02-13T06:18:45Z"

[observer]
# "earth_site" uses lon/lat/height on Earth (IAU_EARTH).
# "spacecraft_state" uses an inertial state vector you supply.
mode = "earth_site"  # "earth_site" | "spacecraft_state"
lon_deg = -155.5763   # Mauna Loa Observatory
lat_deg = 19.5362
height_m = 3397.0

# If spacecraft_state:
# frame = "J2000"
# x_km = 0.0
# y_km = 0.0
# z_km = 0.0
# vx_km_s = 0.0
# vy_km_s = 0.0
# vz_km_s = 0.0

[camera]
nx = 2048
ny = 2048
fov_deg = 1.0
roll_deg = 0.0
pointing = "moon_center"  # moon_center | moon_limb_* | moon_limb_prograde | orbit_path(prograde/velocity)
up_mode = "north"         # north | surface_down
limb_offset_scale = 1.0   # 1.0=exact limb, <1 inward, >1 slightly beyond limb (max 1.5)

[paths]
spice_kernels_dir = "KERNELS"
meta_kernel = "KERNELS/generic.tm"
out_fits = "OUTPUT/synth_moon_advanced_dem_maunaloa.fits"

[moon]
radius_km = 1737.4
brdf = "hapke"     # "lambert" | "hapke"
albedo_map_fits = "DATA/moon_albedo_lroc_wac643_016ppd_mean0p12.fits"
albedo_map_lon_mode = "-180_180"
albedo_map_scale = 1.0

# --- LOLA DEM orography ---
dem_fits = "DATA/moon_dem_lola_ldem16_m.fits"
dem_lon_mode = "0_360"
dem_units = "m"
dem_scale = 1.0
dem_refine_iter = 3

# --- lunar frame (will work once kernels are loaded) ---
spice_frame = "MOON_ME"


# Constant albedo (used if albedo_map_fits not set)
albedo = 0.12

# Optional lunar albedo map (equirectangular FITS). Example: LROC WAC 643 nm mosaic converted to FITS.
# albedo_map_fits = "DATA/moon_albedo_lroc_wac643_016ppd_mean0p12.fits"
# albedo_map_lon_mode = "-180_180"   # "-180_180" or "0_360"
# albedo_map_scale = 1.0

# Optional lunar DEM (LOLA LDEM_16 converted to FITS; values are radius in metres).
# dem_fits = "DATA/moon_dem_lola_ldem16_m.fits"
# dem_lon_mode = "0_360"   # LOLA cylindrical products are typically 0..360E
# dem_units = "m"
# dem_scale = 1.0          # set >1 temporarily to exaggerate relief for debugging
# dem_refine_iter = 3      # 2–4 reasonable

[moon.hapke]
# Used only when moon.brdf = "hapke".
# Hapke-like parameters (dimensionless unless noted):
single_scattering_albedo = 0.55
phase_b = 0.30
phase_c = 0.40
opposition_b0 = 1.00
opposition_h = 0.06
roughness_deg = 20.0

[earth]
radius_km = 6378.1366
brdf = "lambert"

# Base Earth albedo scale (multiplicative)
albedo = 0.30

# Earth treated as an extended disk for earthlight integration
earth_disk_samples = 192

# Tile caching size (pixels); 16 is a good default; 1 disables caching
earthlight_tile_px = 16

# Optional Earth albedo map FITS (equirectangular). If omitted, a toy land/ocean + clouds model may be used.
albedo_map_fits = "DATA/earth_albedo.fits"
albedo_map_lon_mode = "0_360"

# Optional Earth surface class map FITS (equirectangular).
# Here we use preserved MODIS IGBP class ids so land-cover-specific RGB can be assigned.
class_map_fits = "DATA/MODIS/earth_landcover_modis_2011.fits"
class_map_lon_mode = "-180_180"
class_map_interp = "nearest"
earth_color_model = "legacy"   # "legacy" | "physical_rgb"
class_ocean_values = [0]
class_land_values = []
class_ice_values = [15]
class_rgb_preset = "modis_igbp"
class_rgb_default = [0.20, 0.20, 0.20]
cloud_rgb = [0.78, 0.80, 0.82]
ice_rgb = [0.78, 0.82, 0.86]

# Optional physical-RGB mode: treat surface classes as visible-band
# reflectances rather than display colors. Camera bands are interpreted
# approximately as R~650nm, G~550nm, B~450nm.
physical_class_rgb_preset = "modis_igbp"
physical_class_rgb_default = [0.20, 0.20, 0.20]
physical_cloud_rgb = [0.90, 0.90, 0.90]
physical_ice_rgb = [0.84, 0.87, 0.90]
earth_brdf_model = "lambert"   # "lambert" | "simple_kernel"
physical_brdf_strength_vegetation = 0.10
physical_brdf_strength_desert = 0.20
physical_brdf_strength_urban = 0.08
physical_brdf_strength_wetland = 0.06
physical_brdf_strength_ice = 0.05
physical_brdf_strength_land_default = 0.10

# Optional daily sea-ice fraction map (0..1 on lon/lat grid). Prefer this over fake latitude caps.
ice_fraction_map_fits = "DATA/NSIDC/ice_fraction_20110706.fits"
ice_map_lon_mode = "-180_180"
ice_map_interp = "nearest"
ice_fraction_threshold = 0.15
ice_fraction_blend = true

# Optional static land-ice mask (0..1 on lon/lat grid), e.g. Greenland/Antarctica from MCD12C1.
land_ice_mask_fits = "DATA/MODIS/land_ice_mask_2011.fits"
land_ice_mask_lon_mode = "-180_180"
land_ice_mask_interp = "nearest"
land_ice_mask_threshold = 0.5
land_ice_mask_blend = true

land_albedo = 0.25
ocean_albedo = 0.06
cloud_amount = 0.5     # 0..1
cloud_albedo = 0.6 # 0.6
cloud_tau = 1.5        # effective cloud optical thickness
cloud_tau_k = 1.0      # transmission shaping: 1-exp(-k*tau)

# Optional cloud maps (equirectangular). If set, these replace synthetic cloud field.
cloud_fraction_map_fits = "DATA/MODIS/mod08_d3.a2011187.061.2017325045937_cloud_fraction.fits"
cloud_tau_map_fits = "DATA/MODIS/mod08_d3.a2011187.061.2017325045937_cloud_tau.fits"
cloud_map_lon_mode = "-180_180"
cloud_map_interp = "nearest"

# Optional simple seasonal polar caps (latitude threshold varies by day-of-year)
seasonal_ice_enable = false
ice_albedo = 0.65
ice_lat_north_base_deg = 72.0
ice_lat_north_amp_deg = 8.0
ice_lat_south_base_deg = 68.0
ice_lat_south_amp_deg = 5.0
ice_phase_north_doy = 20.0
ice_phase_south_doy = 200.0

# optional: ocean sunglint (simple, fast)
ocean_glint_model = "cox_munk"   # "simple" | "cox_munk"
ocean_glint_strength = 0.15
ocean_glint_sigma_deg = 6.0
ocean_glint_threshold = 0.12
ocean_wind_m_s = 6.0
ocean_refractive_index = 1.334
ocean_glint_max_albedo_increment = 2.0

# Optional first-order atmosphere on top of the surface model:
# surface * transmission + single-scattered path radiance
atmosphere_enable = true
atmosphere_strength = 0.12
atmosphere_mu_floor = 0.03
atmosphere_limb_boost_power = 0.15
atmosphere_twilight_mu = 0.12
atmosphere_sky_rgb = [0.60, 0.72, 1.00]
rayleigh_tau_rgb = [0.10, 0.06, 0.03]
aerosol_tau_rgb = [0.02, 0.02, 0.018]
aerosol_g = 0.70

[sun]
# Extended solar disk (finite angular size) matters near the terminator/horizon.
extended_disk = true
disk_samples = 64
radius_km = 695700.0

[illumination]
include_sun = true
include_earthlight = true

[shadows]
# DEM-aware terrain shadowing
mode = "dem"
sun = "dem"

[output]
psf_mode = "gaussian"
psf_fwhm_out_px = 0.85         # small-telescope Moon PSF at final output scale
# Keep computations float. For convenient viewing in DS9, the primary cube is scaled to 0..65535 in float.
primary_dtype = "float64"          # "float32" or "float64"
primary_scaled_0_65535 = true
store_raw_extension = true         # store unscaled physical-ish layer(s) as extra extension if implemented
write_cube = false                 # write a single 2D image layer (requires only_layer_index)
cube_layer_names = ["RADTOT", "SUNLIT"]   # for cube output: keep only compact Moon layers, in this order
bunit = "I/F_moon"                 # unit label for the primary scaled layer (actual physical units are in other layers)
# Render at camera.nx/ny, then downsample by block-mean to output size (anti-aliased).
downsample_to_nx = 512
downsample_to_ny = 512
only_layer_index = 5              # 5 = RADTOT (Moon radiance in physical units)

[comparison]
# If true, run two renders per call:
# 1) "advanced": current config
# 2) "legacy_parallel": point-source Sun + point-source Earth
enabled = false
write_diff = true
pct_floor_if = 1.0e-5
pct_clip_percent = 1.0
advanced_suffix = "_advanced"
legacy_suffix = "_legacy_parallel"
diff_suffix = "_diff_if"
